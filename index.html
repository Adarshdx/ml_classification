<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #667eea;
            margin-bottom: 30px;
        }
        .prediction-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        .risk-high { background-color: #dc3545; }
        .risk-medium { background-color: #ffc107; }
        .risk-low { background-color: #28a745; }
        .btn-primary {
            background: #667eea;
            border: none;
        }
        .btn-primary:hover {
            background: #764ba2;
        }
        .feature-input {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center">🔮 Customer Churn Prediction Dashboard</h1>
        
        <ul class="nav nav-tabs" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="single-tab" data-bs-toggle="tab" data-bs-target="#single" type="button" role="tab">Single Prediction</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="batch-tab" data-bs-toggle="tab" data-bs-target="#batch" type="button" role="tab">Batch Prediction</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="metrics-tab" data-bs-toggle="tab" data-bs-target="#metrics" type="button" role="tab">Model Metrics</button>
            </li>
        </ul>
        
        <div class="tab-content mt-4" id="myTabContent">
            <!-- Single Prediction Tab -->
            <div class="tab-pane fade show active" id="single" role="tabpanel">
                <div class="row">
                    <div class="col-md-6">
                        <div class="feature-input">
                            <label>Tenure (months)</label>
                            <input type="number" id="tenure" class="form-control" value="12">
                        </div>
                        <div class="feature-input">
                            <label>Monthly Charges ($)</label>
                            <input type="number" id="monthly_charges" class="form-control" value="70.5">
                        </div>
                        <div class="feature-input">
                            <label>Payment Delay Days</label>
                            <input type="number" id="payment_delay" class="form-control" value="5">
                        </div>
                        <div class="feature-input">
                            <label>Number of Complaints</label>
                            <input type="number" id="complaints" class="form-control" value="1">
                        </div>
                        <button class="btn btn-primary mt-3" onclick="predictSingle()">Predict Churn Risk</button>
                    </div>
                    <div class="col-md-6">
                        <div id="prediction-result" style="display: none;">
                            <div class="prediction-card text-center">
                                <h3>Churn Prediction Result</h3>
                                <div id="risk-badge"></div>
                                <h2 id="probability-display"></h2>
                                <p id="recommendation"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Batch Prediction Tab -->
            <div class="tab-pane fade" id="batch" role="tabpanel">
                <div class="text-center">
                    <div class="mb-4">
                        <label class="btn btn-primary">
                            Upload CSV File <input type="file" id="batch-file" style="display: none;" accept=".csv">
                        </label>
                    </div>
                    <div id="batch-result" style="display: none;">
                        <div class="alert alert-info">
                            <h4>Batch Summary</h4>
                            <p id="batch-summary"></p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Model Metrics Tab -->
            <div class="tab-pane fade" id="metrics" role="tabpanel">
                <div id="metrics-plot"></div>
                <div class="row mt-4">
                    <div class="col-md-6">
                        <h4>Confusion Matrix</h4>
                        <div id="confusion-matrix"></div>
                    </div>
                    <div class="col-md-6">
                        <h4>ROC Curve</h4>
                        <div id="roc-curve"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function predictSingle() {
            const data = {
                tenure: parseInt(document.getElementById('tenure').value),
                monthly_charges: parseFloat(document.getElementById('monthly_charges').value),
                payment_delay_days: parseInt(document.getElementById('payment_delay').value),
                complaints: parseInt(document.getElementById('complaints').value),
                total_charges: parseFloat(document.getElementById('monthly_charges').value) * parseInt(document.getElementById('tenure').value)
            };
            
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if (result.success) {
                const resultDiv = document.getElementById('prediction-result');
                resultDiv.style.display = 'block';
                
                const riskBadge = document.getElementById('risk-badge');
                riskBadge.className = `badge risk-${result.risk_level.toLowerCase()}`;
                riskBadge.innerHTML = `${result.risk_level.toUpperCase()} RISK`;
                
                document.getElementById('probability-display').innerHTML = `${(result.probability * 100).toFixed(1)}%`;
                
                let recommendation = '';
                if (result.risk_level === 'High') {
                    recommendation = '🚨 Immediate intervention needed! Offer retention discount and personal support.';
                } else if (result.risk_level === 'Medium') {
                    recommendation = '⚠️ Monitor closely. Send satisfaction survey and engagement offers.';
                } else {
                    recommendation = '✅ Customer is loyal. Maintain good service and consider upsell opportunities.';
                }
                document.getElementById('recommendation').innerHTML = recommendation;
            }
        }
        
        document.getElementById('batch-file').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const formData = new FormData();
            formData.append('file', file);
            
            const response = await fetch('/batch-predict', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            
            if (result.success) {
                document.getElementById('batch-result').style.display = 'block';
                document.getElementById('batch-summary').innerHTML = `
                    Total Customers: ${result.summary.total}<br>
                    High Risk Customers: ${result.summary.churn_risk}<br>
                    Predicted Churn Rate: ${(result.summary.churn_rate * 100).toFixed(1)}%
                `;
            }
        });
        
        async function loadMetrics() {
            const response = await fetch('/metrics');
            const metrics = await response.json();
            
            // Create bar chart for metrics comparison
            const trace = {
                x: ['Logistic Regression', 'Random Forest'],
                y: [metrics.lr_auc, metrics.rf_auc],
                type: 'bar',
                marker: {color: ['#667eea', '#764ba2']}
            };
            Plotly.newPlot('metrics-plot', [trace], {
                title: 'Model Comparison - ROC-AUC',
                yaxis: {title: 'AUC Score', range: [0, 1]}
            });
        }
        
        loadMetrics();
    </script>
</body>
</html>
